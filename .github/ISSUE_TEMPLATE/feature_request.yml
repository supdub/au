name: Feature request
description: Propose a focused improvement to the CLI, docs, or release flow.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links, examples, screenshots, or competing tools.
