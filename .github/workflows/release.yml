name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install .

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: test "$(python -c 'import agent_usage_cli; print(agent_usage_cli.__version__)')" = "${{ steps.version.outputs.value }}"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI help smoke test
        run: python -m agent_usage_cli --help

      - name: Build zipapp
        run: python scripts/build_zipapp.py

      - name: Build deb
        run: ./packaging/debian/build-deb.sh "${{ steps.version.outputs.value }}" all

      - name: Generate checksums
        run: sha256sum dist/au dist/deb/*.deb > dist/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/au
            dist/deb/*.deb
            dist/SHA256SUMS
