name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: python -m pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI help smoke test
        run: python -m agent_usage_cli --help

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install .

      - name: Build zipapp
        run: python scripts/build_zipapp.py

      - name: Resolve version
        id: version
        run: echo "value=$(python -c 'import agent_usage_cli; print(agent_usage_cli.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build deb
        run: ./packaging/debian/build-deb.sh "${{ steps.version.outputs.value }}" all
